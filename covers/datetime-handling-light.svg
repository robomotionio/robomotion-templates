<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-labelledby="coverTitle">
  <title id="coverTitle">Datetime Handling</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/><stop offset="100%" stop-color="#f1f1f4"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#e4e4e8" stroke-width="1"/>
    </pattern>
    <radialGradient id="glowLeft" cx="0" cy="0.5" r="0.8">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="1" cy="0" r="0.9">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cardClip"><rect x="0" y="0" width="600" height="300" rx="20" ry="20"/></clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <rect width="600" height="300" fill="url(#bg)"/>
    <rect width="600" height="300" fill="url(#grid)"/>
    <rect width="600" height="300" fill="url(#glowLeft)"/>
    <rect width="600" height="300" fill="url(#glowRight)"/>

    <g transform="translate(400, 40)">
      <rect x="0" y="0" width="120" height="130" rx="10" fill="#ffffff" stroke="#d4d4d8" stroke-width="1"/>
      <rect x="0" y="0" width="120" height="26" rx="10" fill="#06b6d4" opacity="0.18"/>
      <rect x="0" y="16" width="120" height="10" fill="#06b6d4" opacity="0.18"/>
      <rect x="15" y="-4" width="6" height="14" rx="2" fill="#0891b2"/>
      <rect x="99" y="-4" width="6" height="14" rx="2" fill="#0891b2"/>
      <text x="60" y="18" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0891b2">APR</text>
      <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">
        <text x="18" y="48">M</text><text x="35" y="48">T</text><text x="52" y="48">W</text><text x="69" y="48">T</text><text x="86" y="48">F</text><text x="103" y="48">S</text>
      </g>
      <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#52525b" text-anchor="middle">
        <text x="18" y="65">1</text><text x="35" y="65">2</text><text x="52" y="65">3</text><text x="69" y="65">4</text><text x="86" y="65">5</text><text x="103" y="65">6</text>
        <text x="18" y="82">8</text><text x="35" y="82">9</text><text x="52" y="82">10</text>
      </g>
      <circle cx="69" cy="79" r="9" fill="#06b6d4"/>
      <text x="69" y="82" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">11</text>
      <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#52525b" text-anchor="middle">
        <text x="86" y="82">12</text><text x="103" y="82">13</text>
        <text x="18" y="99">15</text><text x="35" y="99">16</text><text x="52" y="99">17</text><text x="69" y="99">18</text><text x="86" y="99">19</text><text x="103" y="99">20</text>
      </g>
    </g>

    <g transform="translate(355, 50)" opacity="1">
      <circle cx="0" cy="0" r="22" fill="#ffffff" stroke="#f97316" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="-13" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="9" y2="3" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="1.8" fill="#f97316"/>
    </g>

    <text x="40" y="218" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="44" font-weight="700" fill="#0f172a" letter-spacing="-1.2">Datetime Handling</text>
    <text x="40" y="248" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="400" fill="#64748b">Parse, format, and compute dates</text>
    <rect x="1" y="1" width="598" height="298" rx="19" ry="19" fill="none" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="1"/>
  </g>
</svg>
