name: Bulk Shipment Tracking Sweep
slug: bulk-shipment-tracking-sweep
summary: >-
  Checks 200 shipment tracking numbers on a public carrier tracker using eight
  parallel workers pulling from a shared in-memory queue. Reads the tracking
  list straight from the carrier's bulk page, scrapes status, latest event and
  ETA for each shipment, and writes a full status CSV plus an exceptions-only
  CSV covering customs holds, failed deliveries and delays. No login required.
category: Concurrency
level: Advanced
