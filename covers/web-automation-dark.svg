<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-labelledby="coverTitle">
  <title id="coverTitle">Web Automation</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a20"/><stop offset="100%" stop-color="#101015"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#2a2a31" stroke-width="1"/>
    </pattern>
    <radialGradient id="glowLeft" cx="0" cy="0.5" r="0.8">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="1" cy="0" r="0.9">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cardClip"><rect x="0" y="0" width="600" height="300" rx="20" ry="20"/></clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <rect width="600" height="300" fill="url(#bg)"/>
    <rect width="600" height="300" fill="url(#grid)"/>
    <rect width="600" height="300" fill="url(#glowLeft)" opacity="0.9"/>
    <rect width="600" height="300" fill="url(#glowRight)" opacity="0.9"/>

    <!-- Browser window motif -->
    <g transform="translate(400, 40)">
      <rect x="0" y="0" width="170" height="120" rx="8" fill="#1b1b22" stroke="#2f2f37" stroke-width="1"/>
      <!-- Chrome bar -->
      <rect x="0" y="0" width="170" height="22" rx="8" fill="#22222a"/>
      <rect x="0" y="14" width="170" height="8" fill="#22222a"/>
      <circle cx="10" cy="11" r="3" fill="#ef4444" opacity="0.7"/>
      <circle cx="22" cy="11" r="3" fill="#f59e0b" opacity="0.7"/>
      <circle cx="34" cy="11" r="3" fill="#22c55e" opacity="0.7"/>
      <!-- Address bar -->
      <rect x="50" y="6" width="110" height="10" rx="3" fill="#0f0f14" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5"/>
      <!-- Page content lines -->
      <rect x="12" y="36" width="90" height="5" rx="1" fill="#3b82f6" opacity="0.7"/>
      <rect x="12" y="48" width="140" height="3" rx="1" fill="#4b5563"/>
      <rect x="12" y="56" width="120" height="3" rx="1" fill="#4b5563"/>
      <rect x="12" y="64" width="100" height="3" rx="1" fill="#4b5563"/>
      <rect x="12" y="78" width="50" height="14" rx="2" fill="#3b82f6" opacity="0.35"/>
      <rect x="68" y="78" width="50" height="14" rx="2" fill="#1f1f27" stroke="#2f2f37"/>
      <rect x="12" y="100" width="80" height="3" rx="1" fill="#4b5563"/>
      <rect x="12" y="108" width="60" height="3" rx="1" fill="#4b5563"/>
    </g>

    <!-- Cursor -->
    <g transform="translate(500, 160)" opacity="0.9">
      <path d="M 0 0 L 12 10 L 7 11 L 11 18 L 8 19 L 4 12 L 0 14 Z" fill="#f97316" stroke="#1a1a20" stroke-width="1" stroke-linejoin="round"/>
    </g>

    <text x="40" y="218" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-1.2">Web Automation</text>
    <text x="40" y="248" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="400" fill="#a1a1aa">Open pages, scrape metadata, capture screens</text>
    <rect x="1" y="1" width="598" height="298" rx="19" ry="19" fill="none" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>
  </g>
</svg>
