name: Refund Request Triage
slug: refund-request-triage
summary: >-
  Verifies customer refund requests against the bank before approving them.
  Signs in to AcmeBank through two-factor, pulls every shipment charge from the
  operating account and groups them by reference; then works the helpdesk's
  refund queue, and for each ticket looks up the disputed charge to decide
  whether the customer was really billed twice. Approves the genuine duplicates
  and escalates the rest to a human with evidence. Writes a decision CSV.
category: Web Automation
level: Advanced
tags: [web-automation, two-factor, reconciliation, branching, memory-queue]
