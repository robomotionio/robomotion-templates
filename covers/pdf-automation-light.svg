<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-labelledby="coverTitle">
  <title id="coverTitle">PDF Automation</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/><stop offset="100%" stop-color="#f1f1f4"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#e4e4e8" stroke-width="1"/>
    </pattern>
    <radialGradient id="glowLeft" cx="0" cy="0.5" r="0.8">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#ef4444" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="1" cy="0" r="0.9">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cardClip"><rect x="0" y="0" width="600" height="300" rx="20" ry="20"/></clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <rect width="600" height="300" fill="url(#bg)"/>
    <rect width="600" height="300" fill="url(#grid)"/>
    <rect width="600" height="300" fill="url(#glowLeft)"/>
    <rect width="600" height="300" fill="url(#glowRight)"/>

    <g transform="translate(410, 40)">
      <g transform="translate(30, 20) rotate(6)">
        <rect x="0" y="0" width="100" height="130" rx="6" fill="#ffffff" stroke="#d4d4d8"/>
      </g>
      <g transform="translate(15, 10) rotate(3)">
        <rect x="0" y="0" width="100" height="130" rx="6" fill="#ffffff" stroke="#d4d4d8"/>
      </g>
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="100" height="130" rx="6" fill="#fff5f4" stroke="#ef4444" stroke-width="1.5"/>
        <path d="M 78 0 L 100 0 L 100 22 Z" fill="#ffe4e0" stroke="#ef4444" stroke-width="1"/>
        <path d="M 78 0 L 78 22 L 100 22" fill="none" stroke="#ef4444" stroke-width="1"/>
        <rect x="14" y="70" width="34" height="18" rx="3" fill="#ef4444"/>
        <text x="31" y="83" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="800" fill="#ffffff">PDF</text>
        <rect x="14" y="98" width="72" height="3" rx="1" fill="#9ca3af"/>
        <rect x="14" y="107" width="60" height="3" rx="1" fill="#9ca3af"/>
        <rect x="14" y="116" width="66" height="3" rx="1" fill="#9ca3af"/>
      </g>
    </g>

    <text x="40" y="218" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="44" font-weight="700" fill="#0f172a" letter-spacing="-1.2">PDF Automation</text>
    <text x="40" y="248" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="400" fill="#64748b">Create, split, merge, and extract PDFs</text>
    <rect x="1" y="1" width="598" height="298" rx="19" ry="19" fill="none" stroke="#ef4444" stroke-opacity="0.25" stroke-width="1"/>
  </g>
</svg>
