<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-labelledby="coverTitle">
  <title id="coverTitle">Text Manipulation</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/><stop offset="100%" stop-color="#f1f1f4"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#e4e4e8" stroke-width="1"/>
    </pattern>
    <radialGradient id="glowLeft" cx="0" cy="0.5" r="0.8">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="1" cy="0" r="0.9">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cardClip"><rect x="0" y="0" width="600" height="300" rx="20" ry="20"/></clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <rect width="600" height="300" fill="url(#bg)"/>
    <rect width="600" height="300" fill="url(#grid)"/>
    <rect width="600" height="300" fill="url(#glowLeft)"/>
    <rect width="600" height="300" fill="url(#glowRight)"/>

    <g transform="translate(400, 40)">
      <rect x="0" y="0" width="160" height="130" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1"/>
      <rect x="0" y="0" width="22" height="130" rx="8" fill="#f4f4f5"/>
      <rect x="14" y="0" width="8" height="130" fill="#f4f4f5"/>
      <g font-family="ui-monospace, Menlo, monospace" font-size="8" fill="#9ca3af" text-anchor="middle">
        <text x="11" y="22">1</text><text x="11" y="38">2</text><text x="11" y="54">3</text><text x="11" y="70">4</text><text x="11" y="86">5</text><text x="11" y="102">6</text><text x="11" y="118">7</text>
      </g>
      <rect x="30" y="17" width="100" height="5" rx="1" fill="#9ca3af"/>
      <rect x="30" y="33" width="50" height="5" rx="1" fill="#a855f7" opacity="0.85"/>
      <rect x="84" y="33" width="60" height="5" rx="1" fill="#9ca3af"/>
      <rect x="30" y="49" width="110" height="5" rx="1" fill="#9ca3af"/>
      <rect x="30" y="65" width="40" height="5" rx="1" fill="#9ca3af"/>
      <rect x="74" y="65" width="36" height="5" rx="1" fill="#f97316" opacity="0.9"/>
      <rect x="114" y="65" width="20" height="5" rx="1" fill="#9ca3af"/>
      <rect x="30" y="81" width="80" height="5" rx="1" fill="#9ca3af"/>
      <rect x="30" y="97" width="60" height="5" rx="1" fill="#a855f7" opacity="0.85"/>
      <rect x="94" y="97" width="40" height="5" rx="1" fill="#9ca3af"/>
      <rect x="30" y="113" width="70" height="5" rx="1" fill="#9ca3af"/>
    </g>

    <text x="40" y="218" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="44" font-weight="700" fill="#0f172a" letter-spacing="-1.2">Text Manipulation</text>
    <text x="40" y="248" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="400" fill="#64748b">Read, transform, and analyze text files</text>
    <rect x="1" y="1" width="598" height="298" rx="19" ry="19" fill="none" stroke="#a855f7" stroke-opacity="0.25" stroke-width="1"/>
  </g>
</svg>
