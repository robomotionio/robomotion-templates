<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-labelledby="coverTitle">
  <title id="coverTitle">Excel Automation</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f1f1f4"/>
    </linearGradient>

    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#e4e4e8" stroke-width="1"/>
    </pattern>

    <radialGradient id="glowLeft" cx="0" cy="0.5" r="0.8">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="1" cy="0" r="0.9">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#16a34a" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cellAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.9"/>
    </linearGradient>

    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="300" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect width="600" height="300" fill="url(#bg)"/>
    <rect width="600" height="300" fill="url(#grid)"/>
    <rect width="600" height="300" fill="url(#glowLeft)" opacity="1"/>
    <rect width="600" height="300" fill="url(#glowRight)" opacity="1"/>

    <!-- Spreadsheet motif, top-right -->
    <g transform="translate(410, 30)" opacity="1">
      <rect x="0" y="0" width="150" height="24" rx="4" fill="#16a34a" opacity="0.12"/>
      <rect x="0" y="0" width="50" height="24" rx="4" fill="url(#cellAccent)" opacity="0.28"/>
      <line x1="50"  y1="0" x2="50"  y2="24" stroke="#d4d4d8" stroke-width="1"/>
      <line x1="100" y1="0" x2="100" y2="24" stroke="#d4d4d8" stroke-width="1"/>
      <g stroke="#d4d4d8" stroke-width="1" fill="#ffffff">
        <rect x="0"   y="26" width="50" height="24"/>
        <rect x="51"  y="26" width="50" height="24"/>
        <rect x="102" y="26" width="48" height="24"/>
        <rect x="0"   y="52" width="50" height="24"/>
        <rect x="51"  y="52" width="50" height="24"/>
        <rect x="102" y="52" width="48" height="24"/>
        <rect x="0"   y="78" width="50" height="24"/>
        <rect x="51"  y="78" width="50" height="24"/>
        <rect x="102" y="78" width="48" height="24"/>
      </g>
      <g fill="#9ca3af">
        <rect x="6"   y="34" width="36" height="3"/>
        <rect x="57"  y="34" width="30" height="3"/>
        <rect x="108" y="34" width="24" height="3" fill="#16a34a" opacity="0.9"/>
        <rect x="6"   y="60" width="24" height="3"/>
        <rect x="57"  y="60" width="36" height="3"/>
        <rect x="108" y="60" width="30" height="3"/>
        <rect x="6"   y="86" width="30" height="3" fill="#16a34a" opacity="0.9"/>
        <rect x="57"  y="86" width="20" height="3"/>
        <rect x="108" y="86" width="28" height="3"/>
      </g>
      <rect x="51" y="52" width="50" height="24" fill="none" stroke="#f97316" stroke-width="1.5"/>
    </g>

    <!-- Title -->
    <text x="40" y="218" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="44" font-weight="700" fill="#0f172a" letter-spacing="-1.2">
      Excel Automation
    </text>
    <!-- Subtitle -->
    <text x="40" y="248" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="400" fill="#64748b">
      Read, transform, and manage spreadsheets
    </text>

    <rect x="1" y="1" width="598" height="298" rx="19" ry="19" fill="none" stroke="#f97316" stroke-opacity="0.25" stroke-width="1"/>
  </g>
</svg>
