<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-labelledby="coverTitle">
  <title id="coverTitle">Flow Control</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/><stop offset="100%" stop-color="#f1f1f4"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#e4e4e8" stroke-width="1"/>
    </pattern>
    <radialGradient id="glowLeft" cx="0" cy="0.5" r="0.8">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#14b8a6" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="1" cy="0" r="0.9">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cardClip"><rect x="0" y="0" width="600" height="300" rx="20" ry="20"/></clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <rect width="600" height="300" fill="url(#bg)"/>
    <rect width="600" height="300" fill="url(#grid)"/>
    <rect width="600" height="300" fill="url(#glowLeft)"/>
    <rect width="600" height="300" fill="url(#glowRight)"/>

    <g transform="translate(400, 40)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="600">
      <rect x="60" y="0" width="44" height="24" rx="12" fill="#14b8a6" opacity="0.25" stroke="#0d9488" stroke-width="1"/>
      <text x="82" y="16" text-anchor="middle" fill="#0d9488">start</text>
      <line x1="82" y1="24" x2="82" y2="46" stroke="#0d9488" stroke-width="1.5" opacity="0.7"/>
      <polygon points="82,46 122,70 82,94 42,70" fill="#14b8a6" fill-opacity="0.18" stroke="#0d9488" stroke-width="1.5"/>
      <text x="82" y="73" text-anchor="middle" fill="#0d9488">if?</text>
      <line x1="42" y1="70" x2="20" y2="90" stroke="#16a34a" stroke-width="1.5" opacity="0.9"/>
      <line x1="20" y1="90" x2="20" y2="108" stroke="#16a34a" stroke-width="1.5" opacity="0.9"/>
      <rect x="0" y="108" width="40" height="22" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
      <text x="20" y="123" text-anchor="middle" fill="#16a34a">yes</text>
      <line x1="122" y1="70" x2="144" y2="90" stroke="#dc2626" stroke-width="1.5" opacity="0.9"/>
      <line x1="144" y1="90" x2="144" y2="108" stroke="#dc2626" stroke-width="1.5" opacity="0.9"/>
      <rect x="124" y="108" width="40" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
      <text x="144" y="123" text-anchor="middle" fill="#dc2626">no</text>
    </g>

    <text x="40" y="218" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="44" font-weight="700" fill="#0f172a" letter-spacing="-1.2">Flow Control</text>
    <text x="40" y="248" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="400" fill="#64748b">Branch, loop, and orchestrate execution</text>
    <rect x="1" y="1" width="598" height="298" rx="19" ry="19" fill="none" stroke="#14b8a6" stroke-opacity="0.25" stroke-width="1"/>
  </g>
</svg>
